<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Limiter Dashboard - Management Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #10b981;
      --danger: #ef4444;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--card-border);
    }

    .logo-section h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #818cf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-section p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 900px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: var(--danger);
    }
    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-secondary {
      background: #475569;
    }
    .btn-secondary:hover {
      background: #334155;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
    }

    th {
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .badge {
      padding: 0.25rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
    }

    .badge-basic { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge-premium { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge-enterprise { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }

    .id-copy {
      font-family: monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: #cbd5e1;
      border: 1px dashed rgba(255, 255, 255, 0.2);
    }
    .id-copy:hover {
      color: white;
      border-color: var(--primary);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #1e293b;
      border: 1px solid var(--card-border);
      border-radius: 1rem;
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .form-control {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      color: white;
      font-size: 0.95rem;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #10b981;
      color: white;
      padding: 0.8rem 1.4rem;
      border-radius: 0.5rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      font-weight: 500;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
      z-index: 2000;
    }
    .toast.toast-error {
      background: #ef4444;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-section">
      <h1>Rate Limiter Console</h1>
      <p>Phase 2 — Plans & Customers Management</p>
    </div>
    <div>
      <button class="btn btn-secondary" onclick="checkHealth()">Check Health</button>
    </div>
  </header>

  <div class="grid-2">
    <!-- Plans Section -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Tiers & Plans</div>
        <button class="btn" onclick="openPlanModal()">+ Add Plan</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>RPM Limit</th>
            <th>Burst Ceiling</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="plans-table-body">
          <tr><td colspan="4">Loading plans...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Customers Section -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Customers</div>
        <button class="btn" onclick="openCustomerModal()">+ Add Customer</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Customer / ID</th>
            <th>Plan</th>
            <th>Overrides</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="customers-table-body">
          <tr><td colspan="4">Loading customers...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Plan Modal -->
<div class="modal-overlay" id="plan-modal">
  <div class="modal">
    <h2 style="margin-bottom: 1.5rem;" id="plan-modal-title">Add Plan</h2>
    <form id="plan-form" onsubmit="handlePlanSubmit(event)">
      <input type="hidden" id="plan-id">
      <div class="form-group">
        <label>Plan Name</label>
        <input type="text" id="plan-name" class="form-control" placeholder="e.g. ENTERPRISE" required>
      </div>
      <div class="form-group">
        <label>Base RPM Limit (> 0)</label>
        <input type="number" id="plan-rpm" class="form-control" min="1" placeholder="300" required>
      </div>
      <div class="form-group">
        <label>Burst Capacity Ceiling (> 0)</label>
        <input type="number" id="plan-burst" class="form-control" min="1" placeholder="300" required>
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem;">
        <button type="button" class="btn btn-secondary" onclick="closeModal('plan-modal')">Cancel</button>
        <button type="submit" class="btn">Save Plan</button>
      </div>
    </form>
  </div>
</div>

<!-- Customer Modal -->
<div class="modal-overlay" id="customer-modal">
  <div class="modal">
    <h2 style="margin-bottom: 1.5rem;" id="customer-modal-title">Add Customer</h2>
    <form id="customer-form" onsubmit="handleCustomerSubmit(event)">
      <input type="hidden" id="customer-id">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="customer-name" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="customer-email" class="form-control" placeholder="john@example.com" required>
      </div>
      <div class="form-group">
        <label>Assigned Plan</label>
        <select id="customer-plan-id" class="form-control" required></select>
      </div>
      <div class="form-group">
        <label>Custom Enterprise RPM (> 0, Optional)</label>
        <input type="number" id="customer-custom-rpm" class="form-control" min="1" placeholder="Leave empty for tier default">
      </div>
      <div class="form-group">
        <label>Custom Enterprise Burst (> 0, Optional)</label>
        <input type="number" id="customer-custom-burst" class="form-control" min="1" placeholder="Leave empty for tier default">
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem;">
        <button type="button" class="btn btn-secondary" onclick="closeModal('customer-modal')">Cancel</button>
        <button type="submit" class="btn">Save Customer</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">Action completed successfully</div>

<script>
  let cachedPlans = [];

  async function loadData() {
    await fetchPlans();
    await fetchCustomers();
  }

  async function fetchPlans() {
    try {
      const res = await fetch('/api/v1/plans?limit=100');
      const result = await res.json();
      if (result.success) {
        const plans = Array.isArray(result.data) ? result.data : result.data.items;
        cachedPlans = plans;
        renderPlans(plans);
        populatePlanDropdown(plans);
      }
    } catch (err) {
      showToast('Error loading plans', true);
    }
  }

  function renderPlans(plans) {
    const tbody = document.getElementById('plans-table-body');
    if (plans.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4">No plans found.</td></tr>';
      return;
    }

    tbody.innerHTML = plans.map(p => `
      <tr>
        <td><strong>${p.name}</strong></td>
        <td>${p.rpmLimit} RPM</td>
        <td>${p.burstLimit} tokens</td>
        <td>
          <button class="btn btn-secondary" style="padding:0.3rem 0.6rem; font-size:0.8rem;" onclick="editPlan('${p.id}')">Edit</button>
          <button class="btn btn-danger" style="padding:0.3rem 0.6rem; font-size:0.8rem;" onclick="deletePlan('${p.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function populatePlanDropdown(plans) {
    const select = document.getElementById('customer-plan-id');
    select.innerHTML = plans.map(p => `<option value="${p.id}">${p.name} (${p.rpmLimit} RPM)</option>`).join('');
  }

  async function fetchCustomers() {
    try {
      const res = await fetch('/api/v1/customers?limit=100');
      const result = await res.json();
      if (result.success) {
        const customers = Array.isArray(result.data) ? result.data : result.data.items;
        renderCustomers(customers);
      }
    } catch (err) {
      showToast('Error loading customers', true);
    }
  }

  function renderCustomers(customers) {
    const tbody = document.getElementById('customers-table-body');
    if (customers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4">No customers found.</td></tr>';
      return;
    }

    tbody.innerHTML = customers.map(c => {
      const planName = c.plan ? c.plan.name : 'Unknown';
      const badgeClass = `badge-${planName.toLowerCase()}`;
      const overrides = c.customRpmLimit ? `${c.customRpmLimit} RPM / ${c.customBurstLimit || c.plan.burstLimit} Burst` : 'None';
      
      return `
        <tr>
          <td>
            <strong>${c.name}</strong><br>
            <span class="id-copy" title="Click to copy ID for X-Customer-ID header" onclick="copyId('${c.id}')">${c.id}</span>
          </td>
          <td><span class="badge ${badgeClass}">${planName}</span></td>
          <td>${overrides}</td>
          <td>
            <button class="btn btn-secondary" style="padding:0.3rem 0.6rem; font-size:0.8rem;" onclick="editCustomer('${c.id}')">Edit</button>
            <button class="btn btn-danger" style="padding:0.3rem 0.6rem; font-size:0.8rem;" onclick="deleteCustomer('${c.id}')">Delete</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function copyId(id) {
    navigator.clipboard.writeText(id);
    showToast(`Copied X-Customer-ID: ${id.substring(0, 8)}...`);
  }

  // Modals
  function openPlanModal() {
    document.getElementById('plan-form').reset();
    document.getElementById('plan-id').value = '';
    document.getElementById('plan-modal-title').innerText = 'Add Plan';
    document.getElementById('plan-modal').classList.add('active');
  }

  function editPlan(id) {
    const plan = cachedPlans.find(p => p.id === id);
    if (!plan) return;
    document.getElementById('plan-id').value = plan.id;
    document.getElementById('plan-name').value = plan.name;
    document.getElementById('plan-rpm').value = plan.rpmLimit;
    document.getElementById('plan-burst').value = plan.burstLimit;
    document.getElementById('plan-modal-title').innerText = 'Edit Plan';
    document.getElementById('plan-modal').classList.add('active');
  }

  async function handlePlanSubmit(e) {
    e.preventDefault();
    const id = document.getElementById('plan-id').value;
    const rpmLimit = parseInt(document.getElementById('plan-rpm').value, 10);
    const burstLimit = parseInt(document.getElementById('plan-burst').value, 10);

    if (rpmLimit <= 0 || burstLimit <= 0) {
      showToast('Limits must be positive numbers greater than 0', true);
      return;
    }

    const body = {
      name: document.getElementById('plan-name').value,
      rpmLimit,
      burstLimit,
    };

    const method = id ? 'PUT' : 'POST';
    const url = id ? `/api/v1/plans/${id}` : '/api/v1/plans';

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const result = await res.json();
    if (result.success) {
      showToast(id ? 'Plan updated' : 'Plan created');
      closeModal('plan-modal');
      fetchPlans();
    } else {
      showToast(result.message || 'Operation failed', true);
    }
  }

  async function deletePlan(id) {
    if (!confirm('Are you sure you want to delete this plan?')) return;
    const res = await fetch(`/api/v1/plans/${id}`, { method: 'DELETE' });
    const result = await res.json();
    if (result.success) {
      showToast('Plan deleted');
      fetchPlans();
    } else {
      showToast(result.message || 'Failed to delete plan', true);
    }
  }

  function openCustomerModal() {
    document.getElementById('customer-form').reset();
    document.getElementById('customer-id').value = '';
    document.getElementById('customer-modal-title').innerText = 'Add Customer';
    document.getElementById('customer-modal').classList.add('active');
  }

  async function editCustomer(id) {
    const res = await fetch(`/api/v1/customers/${id}`);
    const result = await res.json();
    if (!result.success) return;
    const c = result.data;

    document.getElementById('customer-id').value = c.id;
    document.getElementById('customer-name').value = c.name;
    document.getElementById('customer-email').value = c.email;
    document.getElementById('customer-plan-id').value = c.planId;
    document.getElementById('customer-custom-rpm').value = c.customRpmLimit || '';
    document.getElementById('customer-custom-burst').value = c.customBurstLimit || '';
    document.getElementById('customer-modal-title').innerText = 'Edit Customer';
    document.getElementById('customer-modal').classList.add('active');
  }

  async function handleCustomerSubmit(e) {
    e.preventDefault();
    const id = document.getElementById('customer-id').value;
    const customRpm = document.getElementById('customer-custom-rpm').value;
    const customBurst = document.getElementById('customer-custom-burst').value;

    if (customRpm && parseInt(customRpm, 10) <= 0) {
      showToast('Custom RPM must be greater than 0', true);
      return;
    }
    if (customBurst && parseInt(customBurst, 10) <= 0) {
      showToast('Custom Burst must be greater than 0', true);
      return;
    }

    const body = {
      name: document.getElementById('customer-name').value,
      email: document.getElementById('customer-email').value,
      planId: document.getElementById('customer-plan-id').value,
      ...(customRpm && { customRpmLimit: parseInt(customRpm, 10) }),
      ...(customBurst && { customBurstLimit: parseInt(customBurst, 10) }),
    };

    const method = id ? 'PUT' : 'POST';
    const url = id ? `/api/v1/customers/${id}` : '/api/v1/customers';

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const result = await res.json();
    if (result.success) {
      showToast(id ? 'Customer updated' : 'Customer created');
      closeModal('customer-modal');
      fetchCustomers();
    } else {
      showToast(result.message || 'Operation failed', true);
    }
  }

  async function deleteCustomer(id) {
    if (!confirm('Are you sure you want to delete this customer?')) return;
    const res = await fetch(`/api/v1/customers/${id}`, { method: 'DELETE' });
    const result = await res.json();
    if (result.success) {
      showToast('Customer deleted');
      fetchCustomers();
    } else {
      showToast(result.message || 'Failed to delete customer', true);
    }
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('active');
  }

  async function checkHealth() {
    const res = await fetch('/health');
    const result = await res.json();
    alert(JSON.stringify(result, null, 2));
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    if (isError) {
      toast.classList.add('toast-error');
    } else {
      toast.classList.remove('toast-error');
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  loadData();
</script>
</body>
</html>
